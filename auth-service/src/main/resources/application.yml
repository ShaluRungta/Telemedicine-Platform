spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://localhost:5432/telemedicine_auth
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        show_sql: false
    open-in-view: false
  flyway:
    locations: classpath:db/migration
    enabled: true
    baseline-on-migrate: true
  jackson:
    default-property-inclusion: non_null

server:
  port: 8001
  servlet:
    context-path: /

jwt:
  secret: ${JWT_SECRET:your-very-long-secret-key-that-is-at-least-256-bits-for-hs256-algorithm-change-in-production}
  expiration: 3600000
  refresh-expiration: 86400000

logging:
  level:
    com.telemedicine: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      show-details: always
