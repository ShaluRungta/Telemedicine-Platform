version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: telemedicine-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_INITDB_ARGS: "-c max_connections=200"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    networks:
      - telemedicine-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: telemedicine-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - telemedicine-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: telemedicine-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - telemedicine-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: telemedicine-auth-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/telemedicine_auth
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JWT_SECRET: ${JWT_SECRET:-your-very-long-secret-key-that-is-at-least-256-bits-for-hs256-algorithm-change-in-production}
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - telemedicine-network

  consultation-service:
    build:
      context: ./consultation-service
      dockerfile: Dockerfile
    container_name: telemedicine-consultation-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/telemedicine_consultation
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      AGORA_APP_ID: ${AGORA_APP_ID:-your-agora-app-id}
      AGORA_APP_CERTIFICATE: ${AGORA_APP_CERTIFICATE:-your-agora-certificate}
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - telemedicine-network

  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: telemedicine-payment-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/telemedicine_payment
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - telemedicine-network

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: telemedicine-notification-service
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/telemedicine_notification
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    ports:
      - "8004:8004"
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - telemedicine-network

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: telemedicine-api-gateway
    ports:
      - "8080:8080"
    environment:
      AUTH_SERVICE_URL: http://auth-service:8001
      CONSULTATION_SERVICE_URL: http://consultation-service:8002
      PAYMENT_SERVICE_URL: http://payment-service:8003
      NOTIFICATION_SERVICE_URL: http://notification-service:8004
    depends_on:
      - auth-service
      - consultation-service
      - payment-service
      - notification-service
    networks:
      - telemedicine-network

networks:
  telemedicine-network:
    driver: bridge

volumes:
  postgres_data:
  rabbitmq_data:
  redis_data:
